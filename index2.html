         class="w-10 h-10 object-contain">
    <h1 class="text-xl font-bold text-indigo-600">SkillNexus</h1>
  </div>

  <!-- SEARCH -->
  <div class="flex items-center bg-gray-100 px-4 py-2 rounded-full w-1/3">
    <input type="text" placeholder="Search skills..."
      class="bg-transparent outline-none w-full text-sm">
  </div>

  <!-- RIGHT SIDE -->
  <div class="flex items-center gap-4">

    <button class="text-xl">🔔</button>

    <button class="w-9 h-9 bg-indigo-600 text-white rounded-full">
      M
    </button>

    <!-- KEEP SHARE BUTTON -->
    <button class="bg-indigo-600 text-white px-4 py-2 rounded-lg hover:bg-indigo-700">
      + Share
    </button>

    <!-- NEW POST EXPERIENCE -->
    <button onclick="openForm()"
      class="bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700">
      ✍️ Post Experience
    </button>

  </div>

</header>

<!-- TITLE -->
<section class="text-center py-10">
  <h2 class="text-4xl font-bold">
    Community Skill <span class="text-indigo-600">Sharing</span>
  </h2>
  <p class="text-gray-500 mt-2">
    Learn Programming, Design & Technical Skills
  </p>
</section>

<!-- CARDS -->
<section class="grid grid-cols-1 md:grid-cols-4 gap-6 px-10">

  <!-- PYTHON -->
  <div onclick="openSkill('python')" class="bg-white rounded-xl shadow cursor-pointer hover:scale-105">
    <img src="https://images.unsplash.com/photo-1587620962725-abab7fe55159" class="h-40 w-full object-cover rounded-t-xl">
    <div class="p-4">
      <h3 class="font-bold">Python Data Science</h3>
    </div>
  </div>

  <!-- CYBER -->
  <div onclick="openSkill('cyber')" class="bg-white rounded-xl shadow cursor-pointer hover:scale-105">
    <img src="https://images.unsplash.com/photo-1550751827-4bd374c3f58b" class="h-40 w-full object-cover rounded-t-xl">
    <div class="p-4">
      <h3 class="font-bold">Cybersecurity</h3>
    </div>
  </div>

  <!-- FIGMA -->
  <div onclick="openSkill('figma')" class="bg-white rounded-xl shadow cursor-pointer hover:scale-105">
    <img src="https://images.unsplash.com/photo-1545239351-1141bd82e8a6" class="h-40 w-full object-cover rounded-t-xl">
    <div class="p-4">
      <h3 class="font-bold">Figma UI Design</h3>
    </div>
  </div>

  <!-- LEADERSHIP -->
  <div onclick="openSkill('leadership')" class="bg-white rounded-xl shadow cursor-pointer hover:scale-105">
    <img src="https://images.unsplash.com/photo-1552664730-d307ca884978" class="h-40 w-full object-cover rounded-t-xl">
    <div class="p-4">
      <h3 class="font-bold">Leadership</h3>
    </div>
  </div>

</section>

<!-- DETAIL SECTION -->
<section id="detailSection" class="hidden p-10">

  <h2 id="title" class="text-2xl font-bold"></h2>
  <p id="desc" class="text-gray-500 mb-5"></p>

  <div class="flex gap-4 mb-6">
    <button onclick="showTab('people', event)" class="tab-btn active">People</button>
    <button onclick="showTab('courses', event)" class="tab-btn">Courses</button>
  </div>

  <div id="people"></div>
  <div id="courses" class="hidden"></div>

</section>

<!-- POST EXPERIENCE POPUP -->
<div id="formPopup"
     class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center">

  <div class="bg-white p-6 rounded-xl w-96 text-black">

    <h2 class="text-xl font-bold mb-4 text-indigo-600">
      Post Experience
    </h2>

    <input id="name" placeholder="Your Name" class="w-full border p-2 mb-2">

    <textarea id="experience" placeholder="Your Experience"
      class="w-full border p-2 mb-2"></textarea>

    <!-- DROPDOWN -->
    <select id="language" class="w-full border p-2 mb-2 rounded">
      <option value="">Select Skill</option>
      <option>🐍 Python Data Science</option>
      <option>🔐 Cybersecurity</option>
      <option>🎨 Figma UI Design</option>
      <option>👑 Leadership</option>
    </select>

    <button onclick="submitForm()" class="bg-indigo-600 text-white w-full p-2">
      Submit
    </button>

    <button onclick="closeForm()" class="mt-2 text-red-500 w-full">
      Cancel
    </button>

  </div>
</div>

<!-- SCRIPT -->
<script>

function openSkill(skill) {
  document.getElementById("detailSection").classList.remove("hidden");

  let title = document.getElementById("title");
  let desc = document.getElementById("desc");

  if (skill === "python") {
    title.innerText = "Python Data Science";
    desc.innerText = "Learn Python";
    people.innerHTML = "👤 Aris";
    courses.innerHTML = "📚 NumPy";
  }

  if (skill === "cyber") {
    title.innerText = "Cybersecurity";
    desc.innerText = "Security Basics";
    people.innerHTML = "👤 Zack";
    courses.innerHTML = "📚 Ethical Hacking";
  }

  if (skill === "figma") {
    title.innerText = "Figma UI Design";
    desc.innerText = "UI/UX";
    people.innerHTML = "👤 Luna";
    courses.innerHTML = "📚 UI Kit";
  }

  if (skill === "leadership") {
    title.innerText = "Leadership";
    desc.innerText = "Team Management";
    people.innerHTML = "👤 Manager";
    courses.innerHTML = "📚 Leadership Skills";
  }

  showTab('people');
}

function showTab(tab, event) {
  document.getElementById("people").classList.add("hidden");
  document.getElementById("courses").classList.add("hidden");

  document.getElementById(tab).classList.remove("hidden");

  let buttons = document.querySelectorAll(".tab-btn");
  buttons.forEach(btn => btn.classList.remove("active"));

  if (event) event.target.classList.add("active");
}

function openForm() {
  document.getElementById("formPopup").classList.remove("hidden");
}

function closeForm() {
  document.getElementById("formPopup").classList.add("hidden");
}

function submitForm() {
  let name = document.getElementById("name").value;
  let exp = document.getElementById("experience").value;
  let lang = document.getElementById("language").value;

  if (name === "" || exp === "" || lang === "") {
    alert("Please fill all fields ❗");
    return;
  }

  alert("Experience submitted for " + lang + " 🚀");

  closeForm();
}

</script>

</body>
